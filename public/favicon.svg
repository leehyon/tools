<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="What I Use">
  <!-- Simple, font-free glyph: a 3x3 tools grid -->
  <g fill="#000">
    <rect x="10" y="10" width="12" height="12" rx="3" />
    <rect x="26" y="10" width="12" height="12" rx="3" />
    <rect x="42" y="10" width="12" height="12" rx="3" />

    <rect x="10" y="26" width="12" height="12" rx="3" />
    <rect x="26" y="26" width="12" height="12" rx="3" />
    <rect x="42" y="26" width="12" height="12" rx="3" />

    <rect x="10" y="42" width="12" height="12" rx="3" />
    <rect x="26" y="42" width="12" height="12" rx="3" />
    <!-- bottom-right intentionally omitted to suggest "collection" -->
  </g>
</svg>
